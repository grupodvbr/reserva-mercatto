<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Reservas • Mercatto Delícia</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<meta name="color-scheme" content="dark">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#070b14;
--card:#0f1625;
--line:#1f2937;
--text:#f1f5f9;
--muted:#94a3b8;
--brand:#22c55e;
--brand-dark:#16a34a;
--gold:#ffd700;
--radius:20px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,sans-serif;
background:radial-gradient(circle at top,#0f172a,#020617 70%);
color:var(--text);
overflow-x:hidden;
}

/* HERO */

header{
padding:26px 16px;
}

.hero{
max-width:900px;
margin:auto;
position:relative;
border-radius:26px;
overflow:hidden;
box-shadow:0 40px 80px rgba(0,0,0,.8);
}

.hero video{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(180deg,transparent,rgba(0,0,0,.6));
}

/* BOTÃO SOM */

.sound-btn{
position:absolute;
top:15px;
right:15px;
background:rgba(0,0,0,.6);
border:none;
color:white;
padding:10px 14px;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

/* BOTÕES */

.actions{
max-width:900px;
margin:24px auto;
display:flex;
gap:12px;
flex-wrap:wrap;
}

.btn{
flex:1;
padding:16px;
border-radius:14px;
font-weight:800;
border:1px solid var(--line);
background:#111827;
color:white;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
}

.btn.reservar{
background:linear-gradient(145deg,#ffd700,#ffb700,#ff8c00);
color:#2b1a00;
border:none;
}

.btn.whatsapp{
background:linear-gradient(180deg,var(--brand),var(--brand-dark));
border:none;
}

/* GALERIA */

.gallery{
max-width:900px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:0 16px;
}

.gallery img{
width:100%;
height:150px;
object-fit:cover;
border-radius:14px;
cursor:pointer;
transition:.2s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* SOCIAL */

.social{
max-width:900px;
margin:40px auto;
text-align:center;
}

.social a{
display:inline-block;
margin-top:10px;
padding:14px 20px;
background:#111827;
border-radius:12px;
color:white;
text-decoration:none;
font-weight:700;
}

/* MAPA */

.map{
max-width:900px;
margin:30px auto;
padding:0 16px;
}

.map iframe{
width:100%;
height:320px;
border-radius:18px;
border:none;
}

/* MODAL */

dialog{
width:100%;
max-width:620px;
border:none;
border-radius:26px;
background:linear-gradient(180deg,#111827,#020617);
color:white;
overflow:hidden;
box-shadow:0 60px 120px rgba(0,0,0,.9);
}

dialog::backdrop{
background:rgba(0,0,0,.8);
}

.modal-head{
display:flex;
justify-content:space-between;
align-items:center;
padding:22px;
border-bottom:1px solid var(--line);
font-weight:900;
}

.modal-body{
padding:24px;
max-height:80vh;
overflow:auto;
}

form{display:grid;gap:16px}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

@media(max-width:650px){
.row{grid-template-columns:1fr}
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid var(--line);
background:#020617;
color:white;
}

.submit{
background:linear-gradient(180deg,var(--brand),var(--brand-dark));
border:none;
padding:16px;
border-radius:14px;
font-weight:900;
cursor:pointer;
}

body.modal-open{
overflow:hidden;
}

</style>
</head>

<body>

<header>

<div class="hero">

<video id="heroVideo" autoplay loop muted playsinline>
<source src="https://dxkszikemntfusfyrzos.supabase.co/storage/v1/object/public/MERCATTO/WhatsApp%20Video%202026-03-10%20at%2021.08.40.mp4" type="video/mp4">
</video>

<button class="sound-btn" id="toggleSound">🔇 Som</button>

</div>

<div class="actions">

<button id="btnReservar" class="btn reservar">
Fazer Reserva
</button>

<button id="btnWhats" class="btn whatsapp">
WhatsApp
</button>

</div>

</header>

<!-- GALERIA -->

<section class="gallery">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
<img src="foto5.jpg">
<img src="foto6.jpg">

</section>

<!-- INSTAGRAM -->

<div class="social">

<h2>Siga nosso Instagram</h2>

<a href="https://instagram.com/mercattodelicia_" target="_blank">
📸 @mercattodelicia_
</a>

</div>

<!-- MAPA -->

<div class="map">

<iframe src="https://www.google.com/maps?q=Mercatto%20Delicia&output=embed"></iframe>

</div>

<!-- MODAL RESERVA -->

<dialog id="modalReserva">

<div class="modal-head">
Reserva Mercatto Delícia
<button id="fecharModal">Fechar</button>
</div>

<div class="modal-body">

<form id="formReserva">

<input name="nome" placeholder="Nome completo" required>
<input id="telefone" name="telefone" placeholder="Telefone" required>

<div class="row">
<input type="number" name="pessoas" placeholder="Pessoas" required>

<select name="area">
<option>Área Interna</option>
<option>Área Externa</option>
</select>
</div>

<div class="row">
<input type="date" id="dataReserva" required>
<select id="horaReserva"></select>
</div>

<select name="comanda">
<option>Comanda única</option>
<option>Comandas individuais</option>
</select>

<input name="ocasiao" placeholder="Ex: aniversário, jantar romântico, reunião...">
<input name="decoracao" placeholder="Ex: balões, bolo surpresa...">

<label>
<input type="checkbox" id="aceitarTermos">
Aceito os termos
</label>

<button class="submit">Confirmar Reserva</button>

</form>

</div>

</dialog>

<script>

/* SOM DO VIDEO */

const video=document.getElementById("heroVideo")
const btnSound=document.getElementById("toggleSound")

btnSound.onclick=()=>{
video.muted=!video.muted
btnSound.innerText=video.muted?"🔇 Som":"🔊 Som"
}

/* SUPABASE */

const SUPABASE_URL="https://dxkszikemntfusfyrzos.supabase.co"
const SUPABASE_KEY="sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

const modal=document.getElementById("modalReserva")

btnReservar.onclick=()=>{
modal.showModal()
document.body.classList.add("modal-open")
}

fecharModal.onclick=()=>{
modal.close()
document.body.classList.remove("modal-open")
}

btnWhats.onclick=()=>{
window.open("https://wa.me/557736135148","_blank")
}

/* HORÁRIOS */

dataReserva.addEventListener("change",()=>{

horaReserva.innerHTML=""

const d=new Date(dataReserva.value)
const dia=d.getDay()

let h=[]

if(dia>=1&&dia<=4){
for(let i=11;i<=15;i++){h.push(i+":00",i+":30")}
for(let i=17;i<=22;i++){h.push(i+":00",i+":30")}
}

if(dia==5||dia==6||dia==0){
for(let i=11;i<=22;i++){h.push(i+":00",i+":30")}
}

h.forEach(t=>{
const o=document.createElement("option")
o.value=t
o.textContent=t
horaReserva.appendChild(o)
})

})

/* TELEFONE */

telefone.addEventListener("input",e=>{
let v=e.target.value.replace(/\D/g,"")
if(v.length>11)v=v.slice(0,11)
v=v.replace(/^(\d{2})(\d)/,"($1) $2")
v=v.replace(/(\d)(\d{4})$/,"$1-$2")
e.target.value=v
})

/* ENVIO */

formReserva.onsubmit=async e=>{

e.preventDefault()

if(!aceitarTermos.checked){
alert("Você precisa aceitar os termos.")
return
}

const f=new FormData(formReserva)

const data=dataReserva.value
const hora=horaReserva.value

const datahora=data+"T"+hora

const {error}=await supabaseClient
.from("reservas_mercatto")
.insert({

nome:f.get("nome"),
telefone:f.get("telefone"),
pessoas:Number(f.get("pessoas")),
mesa:f.get("area"),
comandaIndividual:f.get("comanda"),
datahora:datahora,
observacoes:
"Ocasião:"+f.get("ocasiao")+
"|Decoração:"+f.get("decoracao"),
status:"Pendente"

})

if(error){
alert("Erro ao registrar reserva")
return
}

alert("Reserva registrada!")

modal.close()
document.body.classList.remove("modal-open")

formReserva.reset()

}

</script>

</body>
</html>
