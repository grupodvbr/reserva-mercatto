<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<title>Reservas • Mercatto Delícia</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<meta name="color-scheme" content="dark">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* =========================
   PALETA PREMIUM MADEIRA
========================= */

:root{

--bg:#18120e;
--wood:#2b1f18;
--wood-soft:#35261e;

--gold:#c9a66b;
--gold-soft:#e4c791;

--text:#f5f2ec;
--muted:#b9a792;

--radius:14px;

}

/* =========================
   BASE
========================= */

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Inter,sans-serif;

background:linear-gradient(
180deg,
#18120e,
#100b08
);

color:var(--text);

min-height:100vh;

}

/* =========================
   HERO VIDEO
========================= */

header{
padding:26px 16px;
}

.hero{

max-width:900px;
margin:auto;

border-radius:20px;

overflow:hidden;

position:relative;

box-shadow:0 30px 70px rgba(0,0,0,.7);

}

.hero video{

width:100%;
height:100%;
object-fit:cover;
display:block;

}

.hero::after{

content:"";

position:absolute;
inset:0;

background:linear-gradient(
180deg,
rgba(0,0,0,0),
rgba(0,0,0,.55)
);

}

/* =========================
   BOTÃO SOM
========================= */

.sound-toggle{

position:absolute;
top:12px;
right:12px;

background:rgba(0,0,0,.5);

border:none;

color:white;

padding:8px 12px;

border-radius:10px;

font-size:12px;

cursor:pointer;

}

/* =========================
   BOTÕES
========================= */

.actions{

max-width:900px;
margin:22px auto;

display:flex;
gap:10px;
flex-wrap:wrap;

}

.btn{

flex:1;

padding:14px;

border-radius:12px;

font-weight:500;

font-size:14px;

border:1px solid rgba(255,255,255,.06);

background:var(--wood);

color:var(--text);

cursor:pointer;

display:flex;
justify-content:center;
align-items:center;

transition:.25s;

}

.btn:hover{
background:var(--wood-soft);
}

/* RESERVA */

.btn.reservar{

background:linear-gradient(
145deg,
var(--gold),
var(--gold-soft)
);

color:#3a2b22;

font-weight:600;

border:none;

}

/* WHATSAPP */

.btn.whatsapp{

background:#214d3a;

border:none;

}

/* INSTAGRAM */

.btn.instagram{

background:#4a2d3a;

border:none;

}

/* =========================
   GALERIA
========================= */

.galeria{

max-width:900px;

margin:40px auto;

padding:0 16px;

}

.galeria h2{

font-size:18px;

font-weight:500;

color:var(--gold);

margin-bottom:16px;

}

.posts{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:8px;

}

.posts img{

width:100%;

aspect-ratio:1/1;

object-fit:cover;

border-radius:10px;

transition:.3s;

}

.posts img:hover{

transform:scale(1.04);

}

/* MOBILE */

@media(max-width:600px){

.posts{
grid-template-columns:repeat(2,1fr);
}

}

/* =========================
   MODAL
========================= */

dialog{

border:none;

border-radius:18px;

background:var(--wood);

color:white;

width:100%;
max-width:520px;

box-shadow:0 40px 120px rgba(0,0,0,.8);

}

dialog::backdrop{

background:rgba(0,0,0,.7);

}

.modal-head{

display:flex;
justify-content:space-between;

padding:18px;

border-bottom:1px solid rgba(255,255,255,.06);

font-weight:500;

}

.modal-body{

padding:22px;

}

/* =========================
   FORM
========================= */

form{

display:grid;

gap:16px;

}

.row{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

}

@media(max-width:600px){

.row{
grid-template-columns:1fr;
}

}

label{

font-size:12px;

color:var(--muted);

}

input,select{

padding:12px;

border-radius:10px;

border:1px solid rgba(255,255,255,.08);

background:#1a1410;

color:white;

font-size:14px;

}

input:focus,select:focus{

outline:none;

border-color:var(--gold);

}

/* TERMOS */

.termos{

display:flex;

gap:10px;

font-size:12px;

color:var(--muted);

}

/* BOTÃO SUBMIT */

.submit{

background:var(--gold);

border:none;

padding:14px;

border-radius:12px;

font-weight:600;

cursor:pointer;

color:#3a2b22;

}

/* =========================
   FOOTER
========================= */

footer{

margin-top:50px;

padding:30px;

text-align:center;

font-size:13px;

color:var(--muted);

}

</style>

</head>

<body>

<header>

<div class="hero">

<video id="heroVideo" autoplay loop muted playsinline>

<source src="https://dxkszikemntfusfyrzos.supabase.co/storage/v1/object/public/MERCATTO/WhatsApp%20Video%202026-03-10%20at%2021.08.40.mp4" type="video/mp4">

</video>

<button id="toggleSound" class="sound-toggle">
Som
</button>

</div>

<div class="actions">

<button id="btnReservar" class="btn reservar">
Reservar
</button>

<button id="btnWhats" class="btn whatsapp">
WhatsApp
</button>

<button onclick="window.open('https://instagram.com/mercattodelicia','_blank')" class="btn instagram">
Instagram
</button>

</div>

</header>

<section class="galeria">

<h2>Momentos no Mercatto</h2>

<div class="posts">

<img src="https://images.unsplash.com/photo-1544025162-d76694265947">

<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">

<img src="https://images.unsplash.com/photo-1551183053-bf91a1d81141">

<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

<img src="https://images.unsplash.com/photo-1528605248644-14dd04022da1">

<img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5">

</div>

</section>

<footer>

Mercatto Delícia  
Avenida Rui Barbosa 1264  
Reservas: (77) 3613-5148

</footer>

<!-- MODAL RESERVA -->

<dialog id="modalReserva">

<div class="modal-head">
Reserva Mercatto Delícia
<button id="fecharModal">Fechar</button>
</div>

<div class="modal-body">

<form id="formReserva">

<label>Nome</label>
<input name="nome" required>

<label>Contato</label>
<input id="telefone" name="telefone" required>

<div class="row">

<div>
<label>Pessoas</label>
<input type="number" name="pessoas" required>
</div>

<div>
<label>Área Externa</label>
<select name="area">
<option>Não</option>
<option>Sim</option>
</select>
</div>

</div>

<div class="row">

<div>
<label>Data</label>
<input type="date" id="dataReserva" required>
</div>

<div>
<label>Horário</label>
<select id="horaReserva" required></select>
</div>

</div>

<label>Ocasião</label>
<input name="ocasiao">

<label>Decoração</label>
<input name="decoracao">

<div class="termos">

<input type="checkbox" id="aceitarTermos">

<span>
Li e concordo com os
<button type="button" id="abrirTermos">
Termos
</button>
</span>

</div>

<button class="submit">
Confirmar Reserva
</button>

</form>

</div>

</dialog>

<!-- MODAL TERMOS -->

<dialog id="modalTermos">

<div class="modal-head">
Termos da Reserva
<button onclick="modalTermos.close()">Fechar</button>
</div>

<div class="modal-body">

<p>• Reserva mantida por até 20 minutos após horário.</p>

<p>• Taxa de serviço de 10% aplicada.</p>

<p>• Não é permitido confete ou itens perigosos.</p>

</div>

</dialog>

<script>

/* SUPABASE */

const SUPABASE_URL="https://dxkszikemntfusfyrzos.supabase.co"
const SUPABASE_KEY="sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

const modal=document.getElementById("modalReserva")

btnReservar.onclick=()=>{
modal.showModal()
}

fecharModal.onclick=()=>{
modal.close()
}

btnWhats.onclick=()=>{
window.open("https://wa.me/557736135148","_blank")
}

/* HORÁRIOS */

dataReserva.addEventListener("change",()=>{

horaReserva.innerHTML='<option value="">Selecione</option>'

const d=new Date(dataReserva.value)
const dia=d.getDay()

let h=[]

if(dia>=1 && dia<=4){
for(let i=11;i<=15;i++){h.push(i+":00",i+":30")}
for(let i=17;i<=22;i++){h.push(i+":00",i+":30")}
}

if(dia==5||dia==6||dia==0){
for(let i=11;i<=22;i++){h.push(i+":00",i+":30")}
}

h.forEach(t=>{
const o=document.createElement("option")
o.value=t
o.textContent=t
horaReserva.appendChild(o)
})

})

/* TELEFONE */

telefone.addEventListener("input",e=>{

let v=e.target.value.replace(/\D/g,"")

if(v.length>11)v=v.slice(0,11)

v=v.replace(/^(\d{2})(\d)/,"($1) $2")
v=v.replace(/(\d)(\d{4})$/,"$1-$2")

e.target.value=v

})

/* TERMOS */

abrirTermos.onclick=()=>modalTermos.showModal()

/* ENVIO */

formReserva.onsubmit=async e=>{

e.preventDefault()

if(!aceitarTermos.checked){
alert("Você precisa aceitar os termos.")
return
}

const f=new FormData(formReserva)

const data=dataReserva.value
const hora=horaReserva.value

const datahora=data+"T"+hora

const {error}=await supabaseClient
.from("reservas_mercatto")
.insert({

nome:f.get("nome"),
email:"",
telefone:f.get("telefone"),
pessoas:Number(f.get("pessoas")),
mesa:f.get("area")==="Sim"?"Área Externa":"Salão",
cardapio:"",
comandaIndividual:"Não",
datahora:datahora,
observacoes:
"Ocasião: "+(f.get("ocasiao")||"—")+
" | Decoração: "+(f.get("decoracao")||"—"),
valorEstimado:0,
pagamentoAntecipado:0,
banco:"",
status:"Pendente"

})

if(error){

alert("Erro ao registrar reserva")

return

}

alert("Reserva registrada!")

modal.close()

formReserva.reset()

}

/* SOM VIDEO */

const video=document.getElementById("heroVideo")

const btnSom=document.getElementById("toggleSound")

btnSom.onclick=()=>{

video.muted=!video.muted

btnSom.innerText=video.muted
? "Som"
: "Mudo"

}

</script>

</body>
</html>
